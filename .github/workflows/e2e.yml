name: PHP uAMQP E2E

on:
  workflow_dispatch:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    env:
      ACCEPT_EULA: Y
      MSSQL_SA_PASSWORD: P@ssw0rd!2345

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show Docker version
        run: |
          docker version
          docker compose version

      - name: Validate compose configuration
        run: docker compose config

      - name: Run end-to-end flow
        run: docker compose up --build --abort-on-container-exit --exit-code-from phuamqp phuamqp

      - name: Show compose logs on failure
        if: failure()
        run: docker compose logs --no-color --timestamps

      - name: Tear down compose stack
        if: always()
        run: docker compose down -v --remove-orphans

